<!DOCTYPE html>
<html>
<head>
    <title>Socket Test</title>
</head>
<body>
    <h1>Socket Test</h1>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        const socket = io("http://localhost:3000");

        socket.on("connect", () => {
            console.log("Connected:", socket.id);
        });

        socket.on("disconnect", () => {
            console.log("Disconnected");
        });
    </script>
</body>
</html>
